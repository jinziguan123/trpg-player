# 注意：这只是止血，根治仍需 git filter-repo 清洗历史后开源。
commits = [
  "5570b3b188a480c95b4a9e1856bdafd76158851a",
  "29e90792a2875da14dc73e9d1fe0be1c9ca26b6d",
  "a3f8a06aa8b05fe4d92615d69e19dee2e98101e8",
  "4a107c3438cbb13c175fe57e4a0cf98c3247f58c",
]
paths = [
  '''server/ai_settings\.json''',
]
