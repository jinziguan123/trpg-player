<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TRPG Player</title>
  <style>
    html, body { height: 100%; margin: 0; }
    body {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f3ead6; color: #6b4f2a;
    }
    .title { font-size: 20px; font-weight: 700; letter-spacing: 2px; margin-bottom: 18px; }
    .bar-wrap {
      width: 240px; height: 8px; border-radius: 5px; overflow: hidden;
      background: #e3d5b8; box-shadow: inset 0 0 0 1px rgba(107,79,42,.15);
    }
    .bar {
      height: 100%; width: 0%; border-radius: 5px;
      background: linear-gradient(90deg, #b8763c, #8a5a2b);
      transition: width .3s ease;
    }
    .msg { font-size: 12.5px; color: #97865f; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="title">TRPG Player</div>
  <div class="bar-wrap"><div class="bar" id="bar"></div></div>
  <div class="msg" id="msg">正在启动本地服务…</div>
  <script>
    const sleep = (ms) => new Promise((r) => setTimeout(r, ms));
    const setMsg = (t) => { document.getElementById('msg').textContent = t; };
    const setBar = (p) => { document.getElementById('bar').style.width = Math.min(100, p) + '%'; };

    async function invokePort() {
      try { return await window.__TAURI__.core.invoke('backend_port'); }
      catch (e) { return null; }
    }

    async function boot() {
      // 1) 等 Rust 侧拿到后端打印的端口。进度条缓慢爬到 ~60% 表示「正在启动」，
      //    实际就绪由第 2 步的健康检查确认（进度不是伪造的百分比，只作观感反馈）。
      let port = null;
      for (let i = 0; i < 240; i++) {
        port = await invokePort();
        if (port) break;
        setBar(10 + i * 2);           // 逐步爬升，封顶在下面 min(…,60)
        if (10 + i * 2 >= 60) setBar(60);
        await sleep(300);
      }
      if (!port) { setMsg('本地服务启动失败，请重开应用'); return; }
      setBar(70); setMsg('正在等待服务就绪…');
      // 2) 轮询健康检查，就绪后整窗跳到后端同源页面
      for (let i = 0; i < 240; i++) {
        try {
          const r = await fetch(`http://127.0.0.1:${port}/api/health`);
          if (r.ok) { setBar(100); setMsg('就绪，正在进入…'); await sleep(150); location.replace(`http://127.0.0.1:${port}`); return; }
        } catch (e) { /* not up yet */ }
        setBar(70 + Math.min(25, i));   // 70→95 缓慢推进
        await sleep(300);
      }
      setMsg('本地服务未就绪，请重开应用');
    }
    boot();
  </script>
</body>
</html>
