name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  backend:
    name: 后端（pytest + ruff）
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff 静态检查
        run: ruff check .
      - name: Pytest
        run: pytest -q
      - name: Evals 冒烟（零 LLM 费用：验 fixture 可重建 / 上下文可构建 / ORM）
        run: python -m evals.run --smoke
      - name: 导出 OpenAPI 契约
        run: python scripts/export_openapi.py
      - name: OpenAPI 契约无未提交变化
        run: git diff --exit-code -- openapi.json

  frontend:
    name: 前端（tsc + build + oxlint）
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - name: 安装依赖
        run: pnpm install --frozen-lockfile
      - name: 生成 OpenAPI TypeScript 类型
        run: pnpm api:types
      - name: OpenAPI 类型无未提交变化
        run: git diff --exit-code -- apps/web/src/api/generated.ts
      - name: 类型检查
        run: pnpm --filter web exec tsc --noEmit
      - name: 构建
        run: pnpm --filter web build
      - name: Oxlint
        run: pnpm --filter web lint

  secrets:
    name: 密钥扫描（gitleaks）
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
